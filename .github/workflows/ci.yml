name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: parkwise
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d parkwise"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      GEMINI_API_KEY: test-key
      VITE_API_PROXY_TARGET: http://localhost:4000
      CLIENT_URL: http://localhost:3000
      PORT: 4000
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: parkwise
      PGUSER: postgres
      PGPASSWORD: postgres
      JWT_SECRET: ci-secret
      SYS_ADMIN_EMAIL: sysadmin@parkwise.local
      SYS_ADMIN_PASSWORD: ParkWiseAdmin123!
      SYS_ADMIN_NAME: System Admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build client
        run: npm run build

      - name: Start API
        run: npm run server > api.log 2>&1 &

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4000/api/health; then
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become healthy"
          cat api.log
          exit 1

      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: api.log
